<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <header>
        <h1>NO FACE</h1>
      </header>
      <section>
        <div>
          <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
          <p>You <em>know</em> you want to.</p>
        </div>
        <div>
          <h2>Sign up!</h2>
          <form action="" method="post" id="sign-up-form">
          <div>
            <label for="first_name">first name</label>
            <input type="text" id="first_name" name="first_name">
          </div>
          <div>
            <label for="last_name">last name</label>
            <input type="text" id="last_name" name="last_name">
          </div>
          <div>
            <label for="email">email</label>
            <input type="email" id="email" name="email">
          </div>
          <div>
            <label for="phone_number">phone number</label>
            <input type="tel" id="phone_number" name="phone_number">
          </div>
          <div>
            <label for="password">password</label>
            <input type="password" id="password" name="password">
          </div>
          <div>
            <label for="password_confirmation">confirm password</label>
            <input type="password" id="password_confirmation" name="confirmed_password">
          </div>
          </form>
          <button type="submit" form="sign-up-form">Create Account</button>
          <p>Already have an account? <a href="" rel="noopener noreferrer">Log In</a></p>
        </div>
      </section>
    </main>
  </body>
</html>
